<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Bricolage Grotesque','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf9f5"/>
      <stop offset="1" stop-color="#f4efe7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.1" r="0.7">
      <stop offset="0" stop-color="#d6512a" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#d6512a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- faint grid -->
  <g stroke="#e6ddd0" stroke-width="1.5" opacity="0.7">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>
  <!-- logo -->
  <g transform="translate(90,86)">
    <rect width="76" height="76" rx="20" fill="#241f1a"/>
    <rect x="36" y="14" width="4" height="48" rx="2" fill="#f7f4ef"/>
    <rect x="14" y="36" width="48" height="4" rx="2" fill="#f7f4ef"/>
    <circle cx="54" cy="54" r="9" fill="#d6512a"/>
    <text x="98" y="52" font-size="40" font-weight="700" fill="#241f1a" letter-spacing="-1.5">Study Metrics</text>
  </g>
  <!-- headline -->
  <text x="90" y="330" font-size="86" font-weight="700" fill="#241f1a" letter-spacing="-3">Free tools for students.</text>
  <text x="90" y="422" font-size="86" font-weight="700" fill="#b8431f" letter-spacing="-3">No signup. No limits.</text>
  <!-- subline -->
  <text x="92" y="492" font-size="33" font-weight="400" fill="#6b5f52" font-family="Inter,'Segoe UI',system-ui,sans-serif">GPA &amp; CGPA · Final grade · Percentage · Attendance · Word counter</text>
  <!-- pill -->
  <g transform="translate(90,536)">
    <rect width="290" height="52" rx="26" fill="#241f1a"/>
    <text x="145" y="34" font-size="23" font-weight="600" fill="#fbf9f5" text-anchor="middle" font-family="Inter,'Segoe UI',system-ui,sans-serif">studymetrics.app</text>
  </g>
</svg>
